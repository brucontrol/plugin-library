name: Sync Plugin Registry (Beta)

on:
  push:
    branches: [beta]
    paths:
      - 'element-templates/**'
      - 'color-themes/**'
  workflow_dispatch:

jobs:
  sync-beta:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout plugin-library
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: scripts/package-lock.json

      - name: Install script dependencies
        run: npm ci
        working-directory: scripts

      - name: Generate beta manifests
        run: node scripts/generate-manifests.mjs --beta
        env:
          COMMIT_HASH: ${{ github.sha }}
          PLUGIN_REPO: brucontrol/plugin-library

      - name: Checkout brucontrol-releases
        uses: actions/checkout@v4
        with:
          repository: brucontrol/brucontrol-releases
          token: ${{ secrets.REGISTRY_PUSH_TOKEN }}
          path: registry

      - name: Copy beta manifests to registry
        run: |
          cp dist/manifests/*-beta.json registry/plugins/ 2>/dev/null || true

      - name: Update index
        working-directory: registry/scripts
        run: |
          npm ci
          node validate-and-index.mjs

      - name: Commit and push registry
        working-directory: registry
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add plugins/ plugins.json
          if git diff --cached --quiet; then
            echo "No beta manifest changes to commit"
          else
            git commit -m "chore: sync beta manifests from plugin-library@${GITHUB_SHA::8}"
            git push
          fi
