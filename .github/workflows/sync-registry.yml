name: Sync Plugin Registry

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout plugin-library
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: scripts/package-lock.json

      - name: Install script dependencies
        run: npm ci
        working-directory: scripts

      - name: Bump versions for changed element templates
        run: node scripts/bump-element-template-versions.mjs
        env:
          BEFORE_SHA: ${{ github.event.before || 'HEAD~1' }}
          AFTER_SHA: ${{ github.sha }}
          CLEAR_BETA: 'true'

      - name: Generate manifests
        run: node scripts/generate-manifests.mjs
        env:
          COMMIT_HASH: ${{ github.sha }}
          PLUGIN_REPO: brucontrol/plugin-library

      - name: Commit version bumps and assigned plugin IDs
        run: |
          if git diff --quiet element-templates/; then
            echo "No element template manifest changes"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add element-templates/
            git commit -m "chore: bump element template versions and assign plugin ids"
            git push
          fi

      - name: Generate color theme manifests
        run: node scripts/generate-color-theme-manifests.mjs
        env:
          COMMIT_HASH: ${{ github.sha }}
          PLUGIN_REPO: brucontrol/plugin-library

      - name: Checkout brucontrol-releases
        uses: actions/checkout@v4
        with:
          repository: brucontrol/brucontrol-releases
          token: ${{ secrets.REGISTRY_PUSH_TOKEN }}
          path: registry

      - name: Copy manifests to registry
        run: |
          # Remove only stable manifests (preserve *-beta.json from beta branch)
          find registry/plugins -maxdepth 1 -name "*.json" ! -name "*-beta.json" -delete
          cp dist/manifests/*.json registry/plugins/
          # Remove beta manifests for plugins we're promoting to stable
          for f in dist/manifests/*.json; do
            base=$(basename "$f" .json)
            rm -f registry/plugins/$base-beta.json
          done
          mkdir -p registry/color-themes
          cp dist/manifests/color-themes/*.json registry/color-themes/

      - name: Update index and add core flags
        working-directory: registry/scripts
        run: |
          npm ci
          node validate-and-index.mjs
          node validate-and-index-color-themes.mjs

      - name: Commit and push registry
        working-directory: registry
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add plugins/ color-themes/ plugins.json color-themes.json
          if git diff --cached --quiet; then
            echo "No manifest changes to commit"
          else
            git commit -m "chore: sync manifests from plugin-library@${GITHUB_SHA::8}"
            git push
          fi

  backmerge:
    runs-on: ubuntu-latest
    needs: sync
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout beta
          git merge origin/main -m "chore: merge main into beta"
          git push origin beta
