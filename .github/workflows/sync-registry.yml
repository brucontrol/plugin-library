name: Sync Plugin Registry

on:
  push:
    branches: [main]
    paths:
      - 'widgets/**'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout plugin-library
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: scripts/package-lock.json

      - name: Install script dependencies
        run: npm ci
        working-directory: scripts

      - name: Generate manifests
        run: node scripts/generate-manifests.mjs
        env:
          COMMIT_HASH: ${{ github.sha }}
          PLUGIN_REPO: brucontrol/plugin-library

      - name: Checkout brucontrol-releases
        uses: actions/checkout@v4
        with:
          repository: brucontrol/brucontrol-releases
          token: ${{ secrets.REGISTRY_PUSH_TOKEN }}
          path: registry

      - name: Copy manifests to registry
        run: |
          cp dist/manifests/*.json registry/plugins/

      - name: Commit and push registry
        working-directory: registry
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add plugins/
          if git diff --cached --quiet; then
            echo "No manifest changes to commit"
          else
            git commit -m "chore: sync manifests from plugin-library@${GITHUB_SHA::8}"
            git push
          fi
