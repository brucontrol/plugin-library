<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="element">
    <svg id="gaugeSvg" viewBox="0 0 200 128" preserveAspectRatio="xMidYMid meet">
      <defs>
        <filter id="needle-glow" x="-40%" y="-40%" width="180%" height="180%">
          <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="rgba(0,0,0,0.6)"/>
        </filter>
      </defs>
      <!-- Dial background circle -->
      <circle id="gauge-dial" cx="100" cy="98" r="96" fill="var(--bg-tertiary, #1a1a1a)"/>
      <!-- Track arc -->
      <path id="gauge-track" d="M 17 98 A 83 83 0 0 1 183 98"
            fill="none" stroke="var(--bg-secondary, #2c2c2c)" stroke-width="22" stroke-linecap="butt"/>
      <!-- Colored bands -->
      <g id="gauge-bands"></g>
      <!-- Tick marks -->
      <g id="gauge-ticks"></g>
      <!-- Needle group -->
      <g id="needle-group">
        <line id="needle-tail" x1="100" y1="104" x2="100" y2="98" stroke="var(--accent-primary, #569cd6)" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
        <line id="needle-arm" x1="100" y1="98" x2="100" y2="24" stroke="var(--accent-primary, #569cd6)" stroke-width="2.5" stroke-linecap="round" filter="url(#needle-glow)"/>
        <circle id="needle-hub" cx="100" cy="98" r="6" fill="var(--bg-tertiary, #1e1e1e)" stroke="var(--accent-primary, #569cd6)" stroke-width="2"/>
      </g>
      <!-- Value display -->
      <text id="valueNumber" x="100" y="80" text-anchor="middle" fill="var(--accent-green, #4ec9b0)"
            font-size="22" font-weight="700"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">—</text>
      <text id="valueUnit" x="100" y="93" text-anchor="middle" fill="var(--text-secondary, #888)"
            font-size="10" font-weight="500"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"></text>
      <!-- Range labels -->
      <text id="minLabel" x="13" y="113" text-anchor="middle" fill="var(--text-secondary, #888)"
            font-size="10" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">0</text>
      <text id="maxLabel" x="187" y="113" text-anchor="middle" fill="var(--text-secondary, #888)"
            font-size="10" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">100</text>
      <!-- Title label — centered below the arc -->
      <text id="elementTitle" x="100" y="124" text-anchor="middle" fill="var(--text-primary, #cccccc)"
            font-size="11" font-weight="500"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"></text>
    </svg>
  </div>
  <script src="index.js"></script>
</body>
</html>
