description: Speaks text using the hosted Kokoro TTS API (https://kokoro.samf.dev). Audio is pre-fetched when text or voice changes; set speak true to play. Resets speak to false after playback. Add kokoro.samf.dev to ExternalFetch:AllowedHosts if using BruControl server proxy.
