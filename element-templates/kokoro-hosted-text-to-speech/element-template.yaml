name: Kokoro Hosted Text to Speech
description: Speaks text using a configurable Kokoro TTS API (default https://kokoro.samf.dev). Set Server URL in element settings to use your own instance. Audio is pre-fetched when text or voice changes; set speak true to play. Resets speak to false after playback.
