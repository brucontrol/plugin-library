<!DOCTYPE html>
<html>
<head></head>
<body>
  <div id="element">
    <svg id="hoseSvg" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="tubeGloss" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
          <stop offset="0%"   stop-color="#fff" stop-opacity="0.50" />
          <stop offset="30%"  stop-color="#fff" stop-opacity="0.10" />
          <stop offset="50%"  stop-color="#000" stop-opacity="0.00" />
          <stop offset="80%"  stop-color="#000" stop-opacity="0.12" />
          <stop offset="100%" stop-color="#fff" stop-opacity="0.20" />
        </linearGradient>
      </defs>

      <path id="tubePath" class="hose-tube" />
      <path id="fluidPath" class="hose-fluid" />
      <path id="glossPath" class="hose-gloss" />
      <path id="hitPath" class="hose-hit" />

      <g id="bubbleGroup" class="hose-bubbles"></g>

      <g id="handleGroup" class="hose-handles">
        <circle id="startHandle" class="handle endpoint-handle" r="7" />
        <circle id="endHandle" class="handle endpoint-handle" r="7" />
      </g>
    </svg>

    <button id="resetBtn" class="reset-btn" title="Remove all bends">
      <svg viewBox="0 0 16 16" fill="currentColor" width="14" height="14">
        <path d="M2 2h12v2H5.414l2.293 2.293-1.414 1.414L2 3.414V2zm12 12H2v-2h8.586l-2.293-2.293 1.414-1.414L14 12.586V14z"/>
      </svg>
    </button>
  </div>
</body>
</html>
