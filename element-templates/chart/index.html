<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="style.css">
</head>
<body data-element-type="chart">
  <div id="element">
    <div class="element-header" id="elementHeader">
      <span class="element-title" id="elementTitle">Chart</span>
      <span class="element-meta" id="elementMeta">Initializing..</span>
    </div>
    <div class="element-content" id="elementContent">
      <canvas id="chartCanvas"></canvas>
      <div class="chart-overlay hidden" id="chartOverlay">Waiting for chart data...</div>
    </div>
  </div>
  <script src="index.js"></script>
</body>
</html>
