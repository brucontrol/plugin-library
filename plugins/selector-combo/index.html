<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="widget">
    <div class="widget-header">
      <span class="widget-title" id="widgetTitle">Loading...</span>
    </div>
    <div class="widget-content">
      <div class="custom-select" id="customSelect">
        <button class="custom-select-trigger" id="selectTrigger" type="button" disabled>
          <span class="custom-select-value" id="selectValue">--</span>
          <svg class="custom-select-arrow" viewBox="0 0 12 12" xmlns="http://www.w3.org/2000/svg">
            <path d="M2.5 4.5L6 8l3.5-3.5" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <div class="custom-select-dropdown" id="selectDropdown"></div>
      </div>
    </div>
  </div>
  <script src="index.js"></script>
</body>
</html>
