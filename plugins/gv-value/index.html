<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="widget">
    <div class="widget-header">
      <span class="widget-title" id="widgetTitle">Loading...</span>
    </div>
    <div class="widget-content">
      <div class="value-display" id="valueDisplay">--</div>
      <div class="edit-inline" id="editInline" style="display:none;">
        <input id="editInput" type="text" autocomplete="off" />
        <button type="button" class="edit-confirm" id="editConfirm" title="Confirm">&#x2713;</button>
        <button type="button" class="edit-cancel" id="editCancel" title="Cancel">&#x2715;</button>
      </div>
    </div>
  </div>
  <script src="index.js"></script>
</body>
</html>
