<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="style.css">
</head>
<body data-widget-type="generic">
  <div id="widget">
    <div class="widget-header">
      <span class="widget-title" id="widgetTitle">Markdown</span>
      <button class="mode-toggle" id="modeToggle" title="Edit markdown">
        <svg id="editIcon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
        </svg>
        <svg id="viewIcon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </button>
    </div>
    <div class="widget-content" id="widgetContent">
      <div class="markdown-view" id="markdownView"></div>
      <textarea class="markdown-edit" id="markdownEdit" placeholder="Enter markdown here..." style="display:none"></textarea>
    </div>
  </div>
  <script src="index.js"></script>
</body>
</html>
