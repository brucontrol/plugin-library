<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="widget">
    <div class="widget-header">
      <span class="widget-title" id="widgetTitle">—</span>
    </div>
    <div class="widget-content">
      <svg id="gaugeSvg" viewBox="0 0 200 118" preserveAspectRatio="xMidYMid meet">
        <defs>
          <filter id="needle-glow" x="-40%" y="-40%" width="180%" height="180%">
            <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="rgba(0,0,0,0.6)"/>
          </filter>
        </defs>
        <!-- Dial background circle -->
        <circle cx="100" cy="98" r="96" fill="#1a1a1a"/>
        <!-- Track arc (dark gray background of the band) -->
        <path id="gauge-track" d="M 17 98 A 83 83 0 0 1 183 98"
              fill="none" stroke="#2c2c2c" stroke-width="22" stroke-linecap="butt"/>
        <!-- Colored bands -->
        <g id="gauge-bands"></g>
        <!-- Tick marks (on top of bands) -->
        <g id="gauge-ticks"></g>
        <!-- Needle group -->
        <g id="needle-group">
          <line x1="100" y1="104" x2="100" y2="98" stroke="#bbb" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
          <line x1="100" y1="98" x2="100" y2="24" stroke="white" stroke-width="2.5" stroke-linecap="round" filter="url(#needle-glow)"/>
          <circle cx="100" cy="98" r="6" fill="#1e1e1e" stroke="white" stroke-width="2"/>
        </g>
        <!-- Value display -->
        <text id="valueNumber" x="100" y="80" text-anchor="middle" fill="white"
              font-size="22" font-weight="700"
              font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">—</text>
        <text id="valueUnit" x="100" y="93" text-anchor="middle" fill="#888"
              font-size="10" font-weight="500"
              font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"></text>
        <!-- Range labels -->
        <text id="minLabel" x="13" y="113" text-anchor="middle" fill="#888"
              font-size="10" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">0</text>
        <text id="maxLabel" x="187" y="113" text-anchor="middle" fill="#888"
              font-size="10" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">100</text>
      </svg>
    </div>
  </div>
  <script src="index.js"></script>
</body>
</html>
