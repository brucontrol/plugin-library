<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="widget">
    <div class="widget-header">
      <span class="widget-title" id="widgetTitle">—</span>
    </div>
    <div class="widget-content">
      <div class="gauge-container">
        <svg class="gauge-svg" id="gaugeSvg" viewBox="0 0 200 130" preserveAspectRatio="xMidYMid meet">
          <defs>
            <path id="gauge-arc" d="M 20 100 A 80 80 0 0 1 180 100" fill="none" stroke="none"/>
          </defs>
          <g id="gauge-bands"></g>
          <g id="gauge-ticks"></g>
        </svg>
        <div class="needle-pivot">
          <div class="needle" id="needle"></div>
        </div>
        <div class="gauge-value" id="gaugeValue">
          <span class="value-number" id="valueNumber">—</span>
          <span class="value-unit" id="valueUnit"></span>
        </div>
      </div>
    </div>
  </div>
  <script src="index.js"></script>
</body>
</html>
