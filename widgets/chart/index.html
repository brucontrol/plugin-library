<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="style.css">
</head>
<body data-widget-type="chart">
  <div id="widget">
    <div class="widget-header" id="widgetHeader">
      <span class="widget-title" id="widgetTitle">Chart</span>
      <span class="widget-meta" id="widgetMeta">Initializing...</span>
      <button type="button" class="chart-refresh-btn hidden" id="chartRefreshBtn" title="Refresh history">Refresh</button>
    </div>
    <div class="widget-content" id="widgetContent">
      <canvas id="chartCanvas"></canvas>
      <div class="chart-overlay hidden" id="chartOverlay">Waiting for chart data...</div>
    </div>
  </div>
  <script src="index.js"></script>
</body>
</html>
